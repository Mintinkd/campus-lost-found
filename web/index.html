<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园失物招领 - AI智能匹配平台</title>
  <link rel="stylesheet" href="style.css">

  <!--
    环境变量注入:
    方案A: Pages Functions 动态生成 /config.js
    方案B: 构建时 sed 替换占位符
    方案C: 运行时后端 API
    方案D: Workers HTMLRewriter 注入

    优先级: 内联script > /config.js > 后端API > 默认值
  -->

  <!--
    ★★★ 关键: 在这里配置后端 API 地址 ★★★
    本地开发:       http://localhost:3000/api/v1
    Render部署:     https://campus-lost-found-3ywr.onrender.com/api/v1
    如果不设置, 将自动探测同域 /api/v1
  -->
  <script>
    window.__APP_CONFIG__ = window.__APP_CONFIG__ || {};
    window.__APP_CONFIG__.API_BASE = window.__APP_CONFIG__.API_BASE || 'https://campus-lost-found-3ywr.onrender.com/api/v1';
  </script>

  <script src="/config.js" onerror="void(0)"></script>

  <!-- 配置加载器 -->
  <script src="config-loader.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">🔍 校园失物招领</div>
    <div class="nav-links">
      <a href="#" data-page="home" class="nav-link active">首页</a>
      <a href="#" data-page="upload" class="nav-link">上报拾物</a>
      <a href="#" data-page="search" class="nav-link">搜索失物</a>
      <a href="#" data-page="mine" class="nav-link">我的</a>
    </div>
    <div class="nav-auth">
      <span id="user-info" style="display:none"></span>
      <button id="btn-login" class="btn btn-sm" onclick="showLogin()">登录</button>
      <button id="btn-logout" class="btn btn-sm btn-outline" style="display:none" onclick="logout()">退出</button>
    </div>
  </nav>

  <main id="app" class="container">
    <div class="empty-state"><div class="icon">⏳</div><div>正在加载...</div></div>
  </main>

  <div id="modal-overlay" class="modal-overlay" style="display:none"></div>
  <div id="modal" class="modal" style="display:none"></div>

  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
