services:
  - type: web
    name: campus-lost-found
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node src/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_DIALECT
        value: postgres
      - key: DB_HOST
        fromDatabase:
          name: campus-lost-found-db
          property: host
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        fromDatabase:
          name: campus-lost-found-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: campus-lost-found-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: campus-lost-found-db
          property: password
      - key: DB_SSL
        value: "true"
      - key: RECOGNITION_PROVIDER
        value: tensorflow
      - key: NOTIFICATION_PROVIDER
        value: email
      - key: AUTH_PROVIDER
        value: local
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: ENCRYPTION_IV
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: CLOUDINARY_URL
        sync: false

databases:
  - name: campus-lost-found-db
    databaseName: campus_lost_found
    plan: starter
